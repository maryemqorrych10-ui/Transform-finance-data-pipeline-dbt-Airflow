version: 2

models:

  - name: dim_customers
    description: "Dimension table for customers"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    description: "Dimension table for products"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: fct_orders
    description: "Fact table containing aggregated order metrics"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id